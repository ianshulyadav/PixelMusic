name: Build Phone APK (Release)

on:
  push:
    branches: [ master ]
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-phone:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode release keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > vz-pixelmusic.jks

      - name: Create keystore.properties
        run: |
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > keystore.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> keystore.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> keystore.properties

      - name: Build all split + universal release APKs
        run: ./gradlew :app:assembleRelease -Ppixelmusic.enableAbiSplits=true

      - name: Read version name
        id: version
        run: |
          BUILD_TOOLS_VERSION="$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -n 1)"
          VERSION_NAME=$("$ANDROID_HOME/build-tools/$BUILD_TOOLS_VERSION/aapt2" dump badging \
            app/build/outputs/apk/release/app-arm64-v8a-release.apk \
            | grep versionName | sed -E "s/.*versionName='([^']*)'.*/\1/")
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"

      - name: Verify all split APKs
        run: |
          BUILD_TOOLS_VERSION="$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -n 1)"
          for apk in \
            app/build/outputs/apk/release/app-arm64-v8a-release.apk \
            app/build/outputs/apk/release/app-armeabi-v7a-release.apk \
            app/build/outputs/apk/release/app-x86_64-release.apk \
            app/build/outputs/apk/release/app-universal-release.apk
          do
            echo "Verifying $apk..."
            "$ANDROID_HOME/build-tools/$BUILD_TOOLS_VERSION/aapt2" dump badging "$apk" > /dev/null
            "$ANDROID_HOME/build-tools/$BUILD_TOOLS_VERSION/apksigner" verify --verbose "$apk"
          done

      - name: Upload split APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PixelMusic-phone-release-split-apks
          path: |
            app/build/outputs/apk/release/app-arm64-v8a-release.apk
            app/build/outputs/apk/release/app-armeabi-v7a-release.apk
            app/build/outputs/apk/release/app-x86_64-release.apk
            app/build/outputs/apk/release/app-universal-release.apk
          if-no-files-found: error
          compression-level: 0

      - name: Generate Changelog
        id: changelog
        env:
          PREV_SHA: ${{ github.event.before }}
          CURR_SHA: ${{ github.sha }}
        run: |
          python3 - <<'PYEOF'
          import subprocess, html, os

          prev_sha = os.environ.get('PREV_SHA', '')
          curr_sha = os.environ.get('CURR_SHA', '')

          if prev_sha and prev_sha != '0000000000000000000000000000000000000000':
              cmd = ['git', 'log', '--pretty=format:%s', f'{prev_sha}..{curr_sha}']
          else:
              cmd = ['git', 'log', '-n', '5', '--pretty=format:%s']

          try:
              output = subprocess.check_output(cmd).decode('utf-8', errors='ignore')
              commits = [line.strip() for line in output.split('\n') if line.strip()]
          except Exception:
              commits = ['New release build']

          if commits:
              changelog_html = '<blockquote>' + '\n'.join(html.escape(c) for c in commits) + '</blockquote>'
              changelog_md   = '\n'.join('- ' + c for c in commits)
          else:
              changelog_html = '<blockquote>New release build</blockquote>'
              changelog_md   = '- New release build'

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write('changelog_html<<EOF\n' + changelog_html + '\nEOF\n')
              f.write('changelog_md<<EOF\n' + changelog_md + '\nEOF\n')
          PYEOF

      - name: Create GitHub Release
        if: success() && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version_name }}
          name: "PixelMusic v${{ steps.version.outputs.version_name }}"
          body: |
            ## What's new
            ${{ steps.changelog.outputs.changelog_md }}

            ---
            | APK | Target |
            |-----|--------|
            | `app-universal-release.apk` | Universal — works on all devices |
            | `app-arm64-v8a-release.apk` | Modern phones (Pixel, Samsung, etc.) |
            | `app-armeabi-v7a-release.apk` | Older / budget ARM phones |
            | `app-x86_64-release.apk` | Emulators & Chromebooks |

            **Commit:** ${{ github.sha }}
          files: |
            app/build/outputs/apk/release/app-arm64-v8a-release.apk
            app/build/outputs/apk/release/app-armeabi-v7a-release.apk
            app/build/outputs/apk/release/app-x86_64-release.apk
            app/build/outputs/apk/release/app-universal-release.apk
          draft: false
          prerelease: false
          make_latest: true

      - name: Publish all APKs to Telegram Channel
        if: success() && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: "@PixelMusicApp"
          TELEGRAM_THREAD_ID: "2"
          VERSION_NAME: ${{ steps.version.outputs.version_name }}
          CHANGELOG: ${{ steps.changelog.outputs.changelog_html }}
          COMMIT_SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ]; then
            echo "TELEGRAM_BOT_TOKEN not set, skipping."
            exit 0
          fi

          THREAD_ARGS=""
          if [ -n "$TELEGRAM_THREAD_ID" ]; then
            THREAD_ARGS="--form-string message_thread_id=${TELEGRAM_THREAD_ID}"
          fi

          RELEASE_URL="https://github.com/${REPO}/releases/tag/v${VERSION_NAME}"
          COMMIT_URL="https://github.com/${REPO}/commit/${COMMIT_SHA}"

          python3 - <<PYEOF
          import os, urllib.request, urllib.parse

          bot_token    = os.environ['TELEGRAM_BOT_TOKEN']
          chat_id      = os.environ['TELEGRAM_CHAT_ID']
          thread_id    = os.environ.get('TELEGRAM_THREAD_ID', '')
          version      = os.environ['VERSION_NAME']
          changelog    = os.environ['CHANGELOG']
          commit_sha   = os.environ['COMMIT_SHA']
          release_url  = os.environ['RELEASE_URL']
          commit_url   = os.environ['COMMIT_URL']

          caption = (
              f"<b>📱 PixelMusic v{version} — Release</b>\n\n"
              f"<b>Changes:</b>\n{changelog}\n\n"
              f"<b>Commit:</b> <a href='{commit_url}'>{commit_sha[:7]}</a>\n"
              f"<b>Release:</b> <a href='{release_url}'>GitHub Release ↗</a>\n\n"
              f"🚀 All APKs attached below."
          )

          apks = [
              ("app/build/outputs/apk/release/app-universal-release.apk",   caption),
              ("app/build/outputs/apk/release/app-arm64-v8a-release.apk",   "<code>arm64-v8a</code> — Modern phones (Pixel, Samsung, OnePlus…)"),
              ("app/build/outputs/apk/release/app-armeabi-v7a-release.apk", "<code>armeabi-v7a</code> — Older / budget ARM phones"),
              ("app/build/outputs/apk/release/app-x86_64-release.apk",      "<code>x86_64</code> — Emulators &amp; Chromebooks"),
          ]

          url = f"https://api.telegram.org/bot{bot_token}/sendDocument"

          for apk_path, cap in apks:
              import subprocess
              args = [
                  "curl", "-s",
                  "-F", f"document=@{apk_path}",
                  "--form-string", f"chat_id={chat_id}",
                  "--form-string", "parse_mode=HTML",
                  "--form-string", f"caption={cap}",
              ]
              if thread_id:
                  args += ["--form-string", f"message_thread_id={thread_id}"]
              args.append(url)
              result = subprocess.run(args, capture_output=True, text=True)
              print(f"Sent {apk_path}: {result.stdout}")
          PYEOF
